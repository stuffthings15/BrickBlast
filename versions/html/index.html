function resize(){
 const r=LW/LH,ww=window.innerWidth,wh=window.innerHeight;
 let cw,ch;
 if(ww/wh>r){ch=wh;cw=ch*r}else{cw=ww;ch=cw/r}
 canvas.width=cw*devicePixelRatio;canvas.height=ch*devicePixelRatio;
 canvas.style.width=cw+'px';canvas.style.height=ch+'px';
 cssW=cw;cssH=ch;
}
window.addEventListener('resize',resize);resize();

function initAudio(){
 if(!audioCtx){
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return}
  // iOS/Safari unlock: play a silent buffer within the user gesture
  try{const b=audioCtx.createBuffer(1,1,22050),s=audioCtx.createBufferSource();s.buffer=b;s.connect(audioCtx.destination);s.start(0)}catch(e){}
 }
 if(audioCtx.state==='suspended'){
  audioCtx.resume().then(()=>{audioReady=true;if(!musicStarted){musicStarted=true;startMusic()}}).catch(()=>{});
 }else{
  audioReady=true;
  if(!musicStarted){musicStarted=true;startMusic()}
 }
}

function playSFX(freq,durMs){
 if(!audioCtx||!audioReady||sfxVol<=0||freq<=0)return;
 try{
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='square';o.frequency.value=freq;
  const v=sfxVol/400;const t=audioCtx.currentTime;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.01);
  g.gain.linearRampToValueAtTime(0,t+durMs/1000);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+durMs/1000+0.05);
 }catch(e){}
}

let musicNoteIdx=0,musicTimeout=null;
function startMusic(){
 stopMusic();if(!audioCtx||musicVol<=0)return;
 musicPlaying=true;musicNoteIdx=0;playNextNote();
}
function playNextNote(){
 if(!musicPlaying||!audioCtx||!audioReady)return;
 const md=musicData[musicStyle%10];
 if(musicNoteIdx>=md.f.length){musicNoteIdx=0;musicStyle=(musicStyle+1)%10}
 const freq=md.f[musicNoteIdx],dur=md.d[musicNoteIdx]*(100/Math.max(10,musicSpd));
 if(freq>0){
  try{
   const o=audioCtx.createOscillator(),g=audioCtx.createGain();
   const inst=['square','sawtooth','triangle','square','sawtooth','square','sine','square','sawtooth','triangle'];
   o.type=inst[musicStyle%10];o.frequency.value=freq;
   const v=musicVol/800;const t=audioCtx.currentTime;
   g.gain.setValueAtTime(v,t);g.gain.linearRampToValueAtTime(0,t+dur/1000*0.9);
   o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur/1000);
  }catch(e){}
 }
 musicNoteIdx++;
 musicTimeout=setTimeout(playNextNote,dur);
}
function stopMusic(){musicPlaying=false;if(musicTimeout){clearTimeout(musicTimeout);musicTimeout=null}}

function cssToLogical(cx,cy){return{x:cx/cssW*LW,y:cy/cssH*LH}}

function initStars(){
 starX=[];starY=[];starSpd=[];starBr=[];
 for(let i=0;i<120;i++){starX.push(Math.random()*LW);starY.push(Math.random()*LH);starSpd.push(0.2+Math.random()*0.6);starBr.push(60+Math.random()*140|0)}
}

function setupLevel(){
 paddleX=(LW-paddleW)/2;balls=[];powerUps=[];particles=[];
 const spd=INIT_BALL_SPD*Math.pow(1.05,level-1);
 const ang=(220+Math.random()*100)*Math.PI/180;
 let dy=Math.sin(ang)*spd;if(dy>0)dy=-dy;
 balls.push({x:LW/2,y:LH-PADDLE_Y_OFF-PADDLE_H-ballRadius-2,dx:Math.cos(ang)*spd,dy,speed:spd,active:true});
 const margin=20,rows=Math.min(10,BRICK_ROWS+Math.floor((level-1)/3));
 const bw=((LW-2*margin-(BRICK_COLS-1)*BRICK_PAD)/BRICK_COLS)|0;
 let bh=(bw*22/65)|0;if(colorblind)bh=Math.max(bh,28);
 const pal=colorblind?cbColors:rowColors;bricks=[];
 const pat=(level-1)%8;
 for(let r=0;r<rows;r++)for(let c=0;c<BRICK_COLS;c++){
  let skip=false;
  if(pat===1)skip=((r+c)%2===1);
  else if(pat===2){const cr=Math.abs(r-rows/2),cc=Math.abs(c-BRICK_COLS/2);skip=(cr+cc>(rows+BRICK_COLS)/4+1)}
  else if(pat===3)skip=(r>1&&r<rows-2&&c>1&&c<BRICK_COLS-2);
  else if(pat===4)skip=(r%3===1);
  else if(pat===5){const mr=rows>>1,mc=BRICK_COLS>>1;skip=!(Math.abs(r-mr)<=1||Math.abs(c-mc)<=1)}
  else if(pat===6)skip=(r>0&&r<rows-1&&c>0&&c<BRICK_COLS-1);
  else if(pat===7)skip=(Math.random()<0.3);
  if(skip)continue;
  let hits=1;
  if(level>=2&&r<2)hits=2;
  if(level>=4&&r<4)hits=2;
  if(level>=6)hits=Math.max(hits,r<2?3:2);
  if(level>=9)hits=Math.max(hits,r<3?3:2);
  if(level>=12)hits=Math.max(hits,r<2?4:3);
  bricks.push({x:margin+c*(bw+BRICK_PAD),y:BRICK_TOP+r*(bh+BRICK_PAD),w:bw,h:bh,
   c1:pal[r%pal.length][0],c2:pal[r%pal.length][1],row:r,
   hits,pts:(rows-r)*10,alive:true});
 }
}

function startGame(){
 score=0;lives=MAX_LIVES;level=1;combo=0;comboTimer=0;pendingHS=false;hsDelay=0;
 paddleW=PADDLE_W;paddleWTimer=0;ballRadius=BALL_R;speedBoost=false;
 nameInput='';hsSaved=false;getReadyFrames=0;setupLevel();state=States.Playing;
 playSFX(sfxData[sfxStyle][10],100);
}

function nextLevel(){
 level++;combo=0;comboTimer=0;pendingHS=false;hsDelay=0;
 paddleW=PADDLE_W;paddleWTimer=0;getReadyFrames=0;setupLevel();state=States.Playing;
 playSFX(sfxData[sfxStyle][10],100);
}

function ballRect(b,rx,ry,rw,rh){
 const cx=Math.max(rx,Math.min(b.x,rx+rw)),cy=Math.max(ry,Math.min(b.y,ry+rh));
 const dx=b.x-cx,dy=b.y-cy;return dx*dx+dy*dy<=ballRadius*ballRadius;
}

function spawnParticles(x,y,color,count){
 for(let i=0;i<count;i++){
  const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
  particles.push({x,y,dx:Math.cos(a)*s,dy:Math.sin(a)*s,life:20+Math.random()*20|0,maxLife:20+Math.random()*20|0,color,size:2+Math.random()*4,active:true});
 }
}

function spawnPU(x,y){
 const t=Math.random()*9|0;let pt,c1,sym;
 if(t===0){pt=PUType.BluGrow;c1='#3278ff';sym=colorblind?'BIG':'+'}
 else if(t===1){pt=PUType.RedLife;c1='#ff3c3c';sym=colorblind?'1UP':'\u2665'}
 else if(t<=4){pt=PUType.GreenMulti;c1='#32dc64';sym='x3'}
 else if(t===5){pt=PUType.YelShrink;c1='#ffdc32';sym=colorblind?'SML':'-'}
 else if(t===6){pt=PUType.PurpPaddle;c1='#aa50ff';sym=colorblind?'BIG':'x3'}
 else if(t===7){pt=PUType.OrgSlow;c1='#ff963c';sym=colorblind?'SLOW':'-'}
 else{pt=PUType.PinkFast;c1='#ff78c8';sym=colorblind?'FAST':'+'}
 powerUps.push({x,y,type:pt,c1,sym,active:true});
}

function applyPU(t){
 if(t===PUType.BluGrow)ballRadius=Math.min(MAX_BALL_R,ballRadius+6);
 else if(t===PUType.RedLife)lives=Math.min(MAX_LIVES,lives+1);
 else if(t===PUType.GreenMulti){
  const cur=balls.filter(b=>b.active);
  if(cur.length>0){const s=cur[0];
   for(let k=0;k<7;k++){const a=(200+Math.random()*140)*Math.PI/180;
    let dy=Math.sin(a)*s.speed;if(dy>0)dy=-dy;
    balls.push({x:s.x,y:s.y,dx:Math.cos(a)*s.speed,dy,speed:s.speed,active:true});
   }}
 }
 else if(t===PUType.YelShrink)ballRadius=Math.max(MIN_BALL_R,ballRadius-6);
 else if(t===PUType.PurpPaddle){paddleW=PADDLE_W*3;paddleWTimer=480}
 else if(t===PUType.OrgSlow)adjustSpeed(0.85);
 else if(t===PUType.PinkFast)adjustSpeed(1.15);
}

function adjustSpeed(m){
 for(let i=0;i<balls.length;i++){
  if(!balls[i].active)continue;const b=balls[i];
  const ns=Math.max(4,Math.min(25,b.speed*m));
  if(b.speed>0){const s=ns/b.speed;b.dx*=s;b.dy*=s}b.speed=ns;
 }
}

function adjSetting(dir){
 if(settingsSel===0){sfxVol=Math.max(0,Math.min(100,sfxVol+dir*5));playSFX(500,40)}
 if(settingsSel===1)musicVol=Math.max(0,Math.min(100,musicVol+dir*5));
 if(settingsSel===2){musicSpd=Math.max(10,Math.min(200,musicSpd+dir*5));stopMusic();startMusic()}
 if(settingsSel===3){musicStyle=((musicStyle+dir)%10+10)%10;stopMusic();startMusic()}
 if(settingsSel===4){sfxStyle=((sfxStyle+dir)%5+5)%5;playSFX(500,40)}
 if(settingsSel===5)colorblind=!colorblind;
 if(settingsSel===6)speedBoost=!speedBoost;
}

// Update
function updatePaddle(){
 if(touchActive&&touchX>=0){
  const target=touchX/cssW*LW;
  const diff=target-paddleX-paddleW/2;
  paddleX+=Math.sign(diff)*Math.min(Math.abs(diff),PADDLE_SPD*1.5);
 }else if(leftP||rightP){
  if(leftP)paddleX-=PADDLE_SPD;if(rightP)paddleX+=PADDLE_SPD;
  mouseActive=false;
 }else if(mouseActive&&state===States.Playing){
  const diff=mouseLogicalX-paddleX-paddleW/2;
  paddleX+=Math.sign(diff)*Math.min(Math.abs(diff),PADDLE_SPD*1.5);
 }
 if(paddleX<0)paddleX=0;if(paddleX>LW-paddleW)paddleX=LW-paddleW;
}

function updateBalls(){
 if(getReadyFrames>0)return;
 const sm=speedBoost?2:1;
 for(let i=0;i<balls.length;i++){
  const b=balls[i];if(!b.active)continue;
  b.x+=b.dx*sm;b.y+=b.dy*sm;
  if(b.x-ballRadius<=0){b.x=ballRadius;b.dx=Math.abs(b.dx);playWall()}
  if(b.x+ballRadius>=LW){b.x=LW-ballRadius;b.dx=-Math.abs(b.dx);playWall()}
  if(b.y-ballRadius<=0){b.y=ballRadius;b.dy=Math.abs(b.dy);playWall()}
  if(b.y+ballRadius>=LH){b.active=false;spawnParticles(b.x,b.y,'#fff',12);combo=0;comboTimer=0;continue}
  const py=LH-PADDLE_Y_OFF-PADDLE_H;
  if(b.dy>0&&ballRect(b,paddleX,py,paddleW,PADDLE_H)){
   b.y=py-ballRadius-1;
   const hp=Math.max(0.05,Math.min(0.95,(b.x-paddleX)/paddleW));
   const ang=(150-hp*120)*Math.PI/180;
   b.dx=-Math.cos(ang)*b.speed;b.dy=-Math.sin(ang)*b.speed;
   if(Math.abs(b.dy)<2){b.dy=-2;const r=b.speed/Math.sqrt(b.dx*b.dx+b.dy*b.dy);b.dx*=r;b.dy*=r}
   playPaddle();spawnParticles(b.x,b.y,'rgba(100,200,255,1)',4);
  }
  for(let j=0;j<bricks.length;j++){
   const bk=bricks[j];if(!bk.alive)continue;
   if(ballRect(b,bk.x,bk.y,bk.w,bk.h)){
    bk.hits--;
    if(bk.hits<=0){
     bk.alive=false;combo++;comboTimer=90;score+=bk.pts*Math.min(combo,8);
     spawnParticles(bk.x+bk.w/2,bk.y+bk.h/2,bk.c1,PART_COUNT);
     if(combo>=2)playCombo();else playBrick();screenShake=3;
     if(Math.random()<Math.max(0.20,0.54-level*0.03))spawnPU(bk.x+bk.w/2,bk.y+bk.h/2);
    }else{bk.c1='rgba(200,200,200,1)';bk.c2='rgba(240,240,240,1)';playSFX(400,30)}
    const ol=b.x+ballRadius-bk.x,or2=bk.x+bk.w-(b.x-ballRadius);
    const ot=b.y+ballRadius-bk.y,ob=bk.y+bk.h-(b.y-ballRadius);
    if(Math.min(ol,or2)<Math.min(ot,ob))b.dx=-b.dx;else b.dy=-b.dy;break;
   }
  }
 }
 const active=balls.filter(b=>b.active).length;
 if(active===0){
  lives--;playLost();screenShake=10;
  if(lives<=0){if(score>highScore)highScore=score;nameInput='';hsSaved=false;pendingHS=true;hsDelay=60;state=States.Paused}
  else{balls=[];const spd=INIT_BALL_SPD*Math.pow(1.05,level-1);const a=(220+Math.random()*100)*Math.PI/180;let dy=Math.sin(a)*spd;if(dy>0)dy=-dy;balls.push({x:paddleX+paddleW/2,y:LH-PADDLE_Y_OFF-PADDLE_H-ballRadius-2,dx:Math.cos(a)*spd,dy,speed:spd,active:true});getReadyFrames=180}
 }else balls=balls.filter(b=>b.active);
}

function updatePUs(){
 for(let i=powerUps.length-1;i>=0;i--){
  const p=powerUps[i];if(!p.active){powerUps.splice(i,1);continue}
  p.y+=PU_SPD;if(p.y>LH){powerUps.splice(i,1);continue}
  const py=LH-PADDLE_Y_OFF-PADDLE_H;
  if(p.x+PU_SIZE/2>paddleX&&p.x-PU_SIZE/2<paddleX+paddleW&&p.y+PU_SIZE/2>py&&p.y-PU_SIZE/2<py+PADDLE_H){
   applyPU(p.type);spawnParticles(p.x,p.y,p.c1,10);playPU();powerUps.splice(i,1)}
 }
}

function updateParticles(){
 for(let i=particles.length-1;i>=0;i--){
  const p=particles[i];p.x+=p.dx;p.y+=p.dy;p.dy+=0.1;p.life--;
  if(p.life<=0)particles.splice(i,1);
 }
}

function updateTimers(){
 if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0}
 if(paddleWTimer>0){paddleWTimer--;if(paddleWTimer<=0)paddleW=PADDLE_W}
 if(getReadyFrames>0)getReadyFrames--;
}

function updateStars(){for(let i=0;i<starY.length;i++){starY[i]+=starSpd[i];if(starY[i]>LH){starY[i]=0;starX[i]=Math.random()*LW}}}

// Gamepad - supports Xbox, PlayStation, Switch, generic controllers
function pollGamepad(){
 const gps=navigator.getGamepads?navigator.getGamepads():[];
 let gp=null;for(let i=0;i<gps.length;i++){if(gps[i]){gp=gps[i];break}}
 if(!gp)return;
 initAudio();
 const ax0=gp.axes[0]||0,ax1=gp.axes[1]||0,dead=0.15;
 // Right stick as alternate input
 const ax2=gp.axes.length>2?(gp.axes[2]||0):0;
 // Face buttons: A/Cross(0), B/Circle(1), X/Square(2), Y/Triangle(3)
 const btnA=(gp.buttons[0]&&gp.buttons[0].pressed)||(gp.buttons[2]&&gp.buttons[2].pressed);
 const btnB=(gp.buttons[1]&&gp.buttons[1].pressed)||(gp.buttons[3]&&gp.buttons[3].pressed);
 // Menu buttons: Back/Select/Share(8), Start/Options(9)
 const btnStart=(gp.buttons[9]&&gp.buttons[9].pressed)||(gp.buttons[8]&&gp.buttons[8].pressed);
 // Shoulders: LB/L1(4), RB/R1(5), LT/L2(6), RT/R2(7)
 const btnLB=(gp.buttons[4]&&gp.buttons[4].pressed)||(gp.buttons[6]&&gp.buttons[6].pressed);
 const btnRB=(gp.buttons[5]&&gp.buttons[5].pressed)||(gp.buttons[7]&&gp.buttons[7].pressed);
 // D-pad(12-15) + left stick + right stick for navigation
 const dUp=(gp.buttons[12]&&gp.buttons[12].pressed)||(ax1<-0.5);
 const dDown=(gp.buttons[13]&&gp.buttons[13].pressed)||(ax1>0.5);
 const dLeft=(gp.buttons[14]&&gp.buttons[14].pressed)||(ax0<-0.5);
 const dRight=(gp.buttons[15]&&gp.buttons[15].pressed)||(ax0>0.5);
 // Paddle movement via left analog stick
 if(state===States.Playing&&Math.abs(ax0)>dead){
  paddleX+=ax0*PADDLE_SPD*1.2;
  if(paddleX<0)paddleX=0;if(paddleX>LW-paddleW)paddleX=LW-paddleW;
 }
 // Paddle movement via right analog stick
 if(state===States.Playing&&Math.abs(ax2)>dead){
  paddleX+=ax2*PADDLE_SPD*1.2;
  if(paddleX<0)paddleX=0;if(paddleX>LW-paddleW)paddleX=LW-paddleW;
 }
 // D-pad paddle
 if(state===States.Playing){
  if(gp.buttons[14]&&gp.buttons[14].pressed)paddleX-=PADDLE_SPD;
  if(gp.buttons[15]&&gp.buttons[15].pressed)paddleX+=PADDLE_SPD;
  if(paddleX<0)paddleX=0;if(paddleX>LW-paddleW)paddleX=LW-paddleW;
 }
 // A/X = confirm (rising edge)
 if(btnA&&!gpAPrev){
  if(state===States.Menu){startGame();if(audioReady)startMusic()}
  else if(state===States.LevelComplete)nextLevel();
  else if(state===States.Paused&&!pendingHS)state=States.Playing;
  if(state===States.HighScore){
   if(!hsSaved&&nameInput.length===0){nameInput='PLAYER';addHS(nameInput,score);hsSaved=true}
   else if(hsSaved){if(audioReady)startMusic();state=States.Menu}
  }
  else if(state===States.Options&&(settingsSel===5||settingsSel===6))adjSetting(1);
 }
 // B/Circle/Y/Triangle = back/pause
 if(btnB&&!gpBPrev){
  if(state===States.Playing)state=States.Paused;
  else if(state===States.Paused&&!pendingHS)state=States.Playing;
  else if(state===States.Options)state=prevState;
 }
 // Start/Select = options
 if(btnStart&&!gpStartPrev){
  if(state===States.Menu||state===States.Playing||state===States.Paused){prevState=state;state=States.Options}
  else if(state===States.Options)state=prevState;
 }
 // Options navigation
 if(state===States.Options){
  if(dUp&&!gpUpPrev)settingsSel=(settingsSel+6)%7;
  if(dDown&&!gpDownPrev)settingsSel=(settingsSel+1)%7;
  if((dLeft&&!gpLeftPrev)||(btnLB&&!gpLBPrev))adjSetting(-1);
  if((dRight&&!gpRightPrev)||(btnRB&&!gpRBPrev))adjSetting(1);
 }
 // RB/R1/RT during play = speed boost
 if(state===States.Playing&&btnRB&&!gpRBPrev){speedBoost=!speedBoost;playSFX(sfxData[sfxStyle][10],80)}
 gpAPrev=btnA;gpBPrev=btnB;gpStartPrev=btnStart;
 gpUpPrev=dUp;gpDownPrev=dDown;gpLeftPrev=dLeft;gpRightPrev=dRight;
 gpLBPrev=btnLB;gpRBPrev=btnRB;
}

function drawStars(){

 }

function drawRRect(x,y,w,h,r){
 ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
 ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
 ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
 ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// Unified click/tap handler
function handleClick(gx,gy){
 initAudio();if(pendingHS)return;
 if(state===States.Menu){
  if(gy>=575&&gy<=615&&gx>=LW/2-80&&gx<=LW/2+80){prevState=state;state=States.Options;return}
  startGame();return;
 }
 if(state===States.LevelComplete){nextLevel();return}
 if(state===States.Paused&&!pendingHS){state=States.Playing;return}
 if(state===States.HighScore){
  if(!hsSaved){promptName();return}
  if(hsSaved){if(audioReady)startMusic();state=States.Menu};return}
 if(state===States.Options){
  const{px,py}=optXY();
  if(gx>=LW/2-60&&gx<=LW/2+60&&gy>=py+OPT_PH-70&&gy<=py+OPT_PH-38){state=prevState;return}
  let iy=py+OPT_Y0-18;
  for(let i=0;i<7;i++){
   if(gy>=iy&&gy<iy+OPT_IH){
    settingsSel=i;
    if(gx>=px+OPT_PW-200&&gx<px+OPT_PW-120){adjSetting(-1);return}
    if(gx>=px+OPT_PW-100){adjSetting(1);return}
    if(i===5||i===6)adjSetting(1);return;
   }
   iy+=OPT_IH;
  }
  return;
 }
   if(state===States.Playing){
    if(gx>=LW-70&&gx<=LW-15&&gy>=55&&gy<=83){state=States.Paused;return}
    if(gx>=15&&gx<=55&&gy>=55&&gy<=83){speedBoost=!speedBoost;playSFX(sfxData[sfxStyle][10],80);return}
    adjustSpeed(1.12);playSFX(sfxData[sfxStyle][10],60);spawnParticles(LW/2,LH/2,'#ffc832',6);
   }
 }

// Keyboard
document.addEventListener('keydown',e=>{
 initAudio();if(pendingHS)return;
 if(state===States.HighScore){
  if(e.key==='Backspace'){nameInput=nameInput.slice(0,-1);e.preventDefault()}
  else if(e.key==='Enter'&&nameInput.length>0&&!hsSaved){addHS(nameInput,score);hsSaved=true}
  else if(e.key===' '&&hsSaved){if(audioReady)startMusic();state=States.Menu}
  else if(!hsSaved&&e.key.length===1&&nameInput.length<12)nameInput+=e.key.toUpperCase();
  return;
 }
 if(state===States.Options){
  if(e.key==='ArrowUp')settingsSel=(settingsSel+6)%7;
  else if(e.key==='ArrowDown')settingsSel=(settingsSel+1)%7;
  else if(e.key==='ArrowLeft')adjSetting(-1);
  else if(e.key==='ArrowRight')adjSetting(1);
  else if((e.key==='Enter'||e.key===' ')&&(settingsSel===5||settingsSel===6))adjSetting(1);
  else if(e.key==='Escape'||e.key==='o'||e.key==='h')state=prevState;
  return;
 }
 const k=e.key.toLowerCase();
 if(k==='arrowleft'||k==='a'){leftP=true;mouseActive=false}
 if(k==='arrowright'||k==='d'){rightP=true;mouseActive=false}
 if(k===' '){
  if(state===States.Menu){startGame();if(audioReady)startMusic()}
  else if(state===States.LevelComplete)nextLevel();
  else if(state===States.Paused)state=States.Playing;
 }
 if((k==='p'||k==='escape')&&state===States.Playing)state=States.Paused;
 else if((k==='p'||k==='escape')&&state===States.Paused)state=States.Playing;
 if(k==='f'&&state===States.Playing){speedBoost=!speedBoost;playSFX(sfxData[sfxStyle][10],80)}
 if((k==='h'||k==='o')&&(state===States.Menu||state===States.Playing||state===States.Paused)){prevState=state;state=States.Options}
});
document.addEventListener('keyup',e=>{
 const k=e.key.toLowerCase();
 if(k==='arrowleft'||k==='a')leftP=false;
 if(k==='arrowright'||k==='d')rightP=false;
});

// Touch - detect real mobile vs laptop touchscreen
let isMobile=('ontouchstart' in window)&&(navigator.maxTouchPoints>1)&&(/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent));
function touchToLogical(t){
 const rect=canvas.getBoundingClientRect();
 const cx=Math.max(0,Math.min(t.clientX-rect.left,rect.width));
 const cy=Math.max(0,Math.min(t.clientY-rect.top,rect.height));
 return{cx,cy,lx:cx/cssW*LW,ly:cy/cssH*LH};
}
document.addEventListener('touchstart',e=>{
 initAudio();
 if(!isMobile){return}
 e.preventDefault();
 const t=e.touches[0];
 const{cx,cy,lx,ly}=touchToLogical(t);
 touchX=cx;touchActive=true;mouseActive=false;
 canvas.style.cursor='none';
 if(state===States.Playing&&e.touches.length>=2){speedBoost=!speedBoost;playSFX(sfxData[sfxStyle][10],60);return}
 handleClick(lx,ly);
},{passive:false});
document.addEventListener('touchmove',e=>{
 if(!isMobile)return;
 e.preventDefault();
 if(e.touches.length>0){
  const{cx}=touchToLogical(e.touches[0]);
  touchX=cx;touchActive=true;
 }
},{passive:false});
document.addEventListener('touchend',e=>{
 if(!isMobile)return;
 e.preventDefault();
 if(e.touches.length===0){touchActive=false;touchX=-1}
 else{const{cx}=touchToLogical(e.touches[0]);touchX=cx}
},{passive:false});

// Mouse - works for desktop, laptop, and laptop touchscreen (non-mobile)
canvas.addEventListener('mousedown',e=>{
 initAudio();
 if(touchActive)return;
 const rect=canvas.getBoundingClientRect();
 const lp=cssToLogical(e.clientX-rect.left,e.clientY-rect.top);
 handleClick(lp.x,lp.y);
});
canvas.addEventListener('mousemove',e=>{
 if(touchActive)return;
 canvas.style.cursor=state===States.Playing?'none':'default';
 if(state!==States.Playing)return;
 const rect=canvas.getBoundingClientRect();
 mouseLogicalX=(e.clientX-rect.left)/cssW*LW;mouseActive=true;
});
canvas.addEventListener('mouseleave',()=>{mouseActive=false;canvas.style.cursor='default'});

// Main loop
function gameLoop(){
 frameCount++;updateStars();pollGamepad();
 if(hsDelay>0){hsDelay--;if(hsDelay===0&&pendingHS){pendingHS=false;state=States.HighScore;stopMusic()}}
 if(state===States.Playing){updatePaddle();updateBalls();updatePUs();updateParticles();updateTimers();checkComplete()}
 if(screenShake>0)screenShake--;
 ctx.save();const sx=canvas.width/LW,sy=canvas.height/LH;ctx.scale(sx,sy);
 if(screenShake>0)ctx.translate((Math.random()*6-3)|0,(Math.random()*6-3)|0);
 ctx.clearRect(-10,-10,LW+20,LH+20);drawStars();
 switch(state){
  case States.Menu:drawMenu();break;
  case States.Playing:case States.Paused:drawGame();if(state===States.Paused&&!pendingHS)drawOverlay('PAUSED','Tap/Click/SPACE/\uD83C\uDFAE A to resume');break;
  case States.LevelComplete:drawGame();drawOverlay('LEVEL '+level+' COMPLETE!','Tap/Click/SPACE/\uD83C\uDFAE A for next level',true);break;
  case States.Options:if(prevState===States.Playing||prevState===States.Paused)drawGame();drawOptions();break;
  case States.HighScore:drawStars();drawHighScore();break;
 }
 ctx.restore();requestAnimationFrame(gameLoop);
}

// Init
const ld=document.getElementById('loading');if(ld)ld.remove();
initStars();loadHS();requestAnimationFrame(gameLoop);
</script>
